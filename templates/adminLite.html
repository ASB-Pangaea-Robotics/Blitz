<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>TACTICAL COMMAND | Admin Console</title>
  <link rel="stylesheet" href="../static/adminLite.css"/>
</head>
<body>

<nav class="top-nav">
  <div class="nav-logo">Blitz</div>

  <div class="nav-links">
    <a class="nav-link" href="operations.html">OPERATIONS</a>
    <a class="nav-link" href="leaderboard.html">LEADERBOARD</a>
    <a class="nav-link" href="shop.html">SHOP</a>
    <a class="nav-link active" href="admin.html">ADMIN</a>
  </div>

   <div class="nav-right">
    <div class="nav-icons">
      <button class="nav-icon-btn">
           <span class="material-symbols-outlined">notifications</span>
      </button>
      <button class="nav-icon-btn" onclick="signOut()">
          <span class="material-symbols-outlined">logout</span>
      </button>
    </div>
    <div class="nav-user">
      <span class="nav-username" id="nav-username">USER_NAME</span>
      <img id="nav-avatar" src="" alt="avatar" style="width:2rem;height:2rem;border-radius:9999px;border:1px solid var(--primary);display:none;"/>
    </div>
  </div>
</nav>

  <main>
      <section class="video-section">

        <div class="video-section-header">
          <h3 class="video-title">
            <span class="material-symbols-outlined">videocam</span>
            <span id="user-name">Player Name</span>
            <span> &rarr; </span> 
            <span id="target-name">Target Name</span>
          </h3>
        </div>

        <!-- Portrait Video Area -->
        <div class="video-area">
          <div class="video-gradient"></div>

          <!-- Viewfinder Corners -->
          <div class="vf-tl"></div>
          <div class="vf-tr"></div>
          <div class="vf-bl"></div>
          <div class="vf-br"></div>

          <!-- Video evidence player -->
          <video id="evidence-video" controls style="display:none;width:100%;height:100%;object-fit:contain;position:relative;z-index:1;"></video>

          <!-- No signal placeholder -->
          <div id="video-placeholder" class="video-placeholder">
            <span class="material-symbols-outlined">sensors_off</span>
            <p id="placeholder-text">Waiting for Stream Data...</p>
          </div>

          <!-- HUD bar -->
          <div class="video-hud">
            <div class="hud-stats">
              <span>LATENCY: 12ms</span>
              <span>BITRATE: 4500kbps</span>
            </div>
            <div class="hud-bar-track">
              <div class="hud-bar-fill"></div>
            </div>
          </div>
        </div>

        <!-- Decision Buttons -->
        <div class="decision-grid">
          <button class="btn-yes" onclick="submitDecision('approve')">
            <span class="material-symbols-outlined filled">check_circle</span>
            YES
          </button>
          <button class="btn-no" onclick="submitDecision('reject')">
            <span class="material-symbols-outlined filled">cancel</span>
            NO
          </button>
        </div>
      </section>
  </main>

  <nav class="bottom-nav">
    <a class="bottom-nav-link" href="operations.html">
      <span class="material-symbols-outlined">gps_fixed</span>
      <span class="bottom-nav-label">OPERATIONS</span>
    </a>
    <a class="bottom-nav-link" href="leaderboard.html">
      <span class="material-symbols-outlined">leaderboard</span>
      <span class="bottom-nav-label">LEADERBOARD</span>
    </a>
    <a class="bottom-nav-link" href="shop.html">
      <span class="material-symbols-outlined">shopping_cart</span>
      <span class="bottom-nav-label">SHOP</span>
    </a>
    <a class="bottom-nav-link active" href="admin.html">
      <span class="material-symbols-outlined">shield_person</span>
      <span class="bottom-nav-label">ADMIN</span>
    </a>
  </nav>

  <script src="../static/adminLite.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
</body>
</html>
